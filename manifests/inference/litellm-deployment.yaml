apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: inference
  labels:
    app.kubernetes.io/name: litellm
    hermes.family/component: inference-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          ports:
            - containerPort: 4000
          env:
            - name: LITELLM_MODE
              value: "PRODUCTION"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"